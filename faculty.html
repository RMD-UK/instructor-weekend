<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMD Birmingham Faculty — RMD UK</title>
  <link rel="stylesheet" href="css/rmd.css">
</head>
<body>

<nav class="site-nav">
  <a href="index.html" style="display:flex;align-items:center;text-decoration:none;" id="logoLink">
    <img src="assets/rmd-logo.png" alt="RMD logo" class="logo">
  </a>
  <span class="site-title">RMD UK</span>
  <div class="site-links">
    <a href="index.html">Home</a>
    <a href="rmd-birmingham.html">RMD Birmingham</a>
  </div>
</nav>

<div class="rmd-hero">
  <h1 id="pageTitle">RMD Birmingham Faculty</h1>
  <p>Academic year <span id="rosterYear"></span></p>
</div>

<div class="content-wrap">

  <a href="rmd-birmingham.html" class="back-link">← Back to RMD Birmingham</a>

  <div class="faculty-toggle">
    <a id="tabStudent" href="faculty.html?group=student">Student Faculty</a>
    <a id="tabSenior" href="faculty.html?group=senior">Senior Faculty</a>
  </div>

  <div class="content-card">
    <h2 id="groupHeading">Student Faculty</h2>
    <p class="text-muted text-sm mb-8" id="groupNote">Photos coming soon. Roles are drawn from the current academic year's RMD Birmingham student faculty structure.</p>
    <div id="facultyTeams"></div>
    <ul class="faculty-list" id="facultyList"></ul>
  </div>

</div>

<script src="js/firebase-config.js"></script>
<script>
  // ── Static faculty roster, sourced from the MOU roster + student faculty
  // role list ──────────────────────────────────────────────────────────────
  // The mou_roster Firestore collection is authenticated-read-only (it holds
  // member emails — see firestore.rules), so this public page uses a static
  // name-only list instead of querying it live, to avoid exposing emails.
  //
  // Refresh this each academic year alongside the MOU roster reimport (see
  // admin-mou-dashboard.html "Manage roster" tab) and the student faculty
  // role document Jon circulates at the start of the year: filter the roster
  // for role "RMD Student Faculty" / "RMD Senior Faculty" for names, and use
  // the role document for team/lead structure on the student side.
  const ROSTER_YEAR = (typeof CURRENT_MOU_YEAR !== "undefined") ? CURRENT_MOU_YEAR : "2026/27";

  const FACULTY = {
    student: [
      { team: "Student Faculty Chair", members: [
        { name: "Tanwen Bird", role: "Chair" }
      ]},
      { team: "Team Teachers", members: [
        { name: "Alessandro Pace", role: "Team Lead" },
        { name: "Isabel (Issy) Winfield", role: "Team Member" },
        { name: "Theresa (Tess) Brock", role: "Team Member" },
        { name: "Tegan Bailey", role: "Team Member" }
      ]},
      { team: "Team Admin", members: [
        { name: "Stella Szeckler", role: "Team Lead" },
        { name: "Holly Smyth", role: "Team Member" },
        { name: "Stephanie (Ellie) Scholes", role: "Team Member" },
        { name: "Georgia Crutchfield", role: "Team Member" }
      ]},
      { team: "Team Logistics", members: [
        { name: "Krishan (Krish) Patel", role: "Team Lead" },
        { name: "Megan Harrison", role: "Team Member" },
        { name: "Jaimini Lakhani", role: "Team Member" },
        { name: "Sophie McKillop", role: "Team Member" }
      ]},
      { team: "Nurse Refresher Co-leads", members: [
        { name: "Emily Bracegirdle-Morais", role: "Co-lead" },
        { name: "Kit (Katharine) Smith", role: "Co-lead" }
      ]}
    ],
    senior: [
      "Tom Burton", "Ben Stanley", "Chesca Harper", "Zanita Volschenk",
      "Rosie Lilwall", "Breanna Blackboro", "Cameron Parkes",
      "Naveed Kordmahalleh", "Laura Smith", "Jon Hulme", "Nick Coffin",
      "Joe Alderman"
    ]
  };

  const params = new URLSearchParams(window.location.search);
  const group  = params.get("group") === "senior" ? "senior" : "student";

  document.getElementById("rosterYear").textContent = ROSTER_YEAR;
  document.getElementById("tab" + (group === "senior" ? "Senior" : "Student")).classList.add("active");
  document.getElementById("groupHeading").textContent = group === "senior" ? "Senior Faculty" : "Student Faculty";
  document.getElementById("pageTitle").textContent = "RMD Birmingham " + (group === "senior" ? "Senior" : "Student") + " Faculty";

  const teamsEl = document.getElementById("facultyTeams");
  const listEl  = document.getElementById("facultyList");
  const noteEl  = document.getElementById("groupNote");

  if (group === "senior") {
    // Flat list — no team structure for senior faculty.
    noteEl.textContent = "Photos coming soon. Names are drawn from the current academic year's RMD Birmingham MOU roster.";
    FACULTY.senior.forEach(name => {
      const li = document.createElement("li");
      li.textContent = name;
      listEl.appendChild(li);
    });
  } else {
    // Grouped by team, with lead/member/co-lead roles.
    FACULTY.student.forEach(team => {
      const wrap = document.createElement("div");
      wrap.className = "faculty-team-group";

      const title = document.createElement("div");
      title.className = "faculty-team-title";
      title.textContent = team.team;
      wrap.appendChild(title);

      const ul = document.createElement("ul");
      ul.className = "faculty-list";
      team.members.forEach(m => {
        const li = document.createElement("li");
        li.textContent = m.name;
        const roleSpan = document.createElement("span");
        roleSpan.className = "faculty-role";
        roleSpan.textContent = m.role;
        li.appendChild(roleSpan);
        ul.appendChild(li);
      });
      wrap.appendChild(ul);
      teamsEl.appendChild(wrap);
    });
  }
</script>
</body>
</html>
