<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Instructor Development — RMD 2026</title>
  <link rel="stylesheet" href="css/rmd.css">
  <style>
    * { box-sizing: border-box; }
    body { background: #f0f3f6; font-family: var(--font); margin: 0; padding: 0 0 60px; }

    /* ── Top bar ── */
    .top-bar {
      background: var(--rmd-navy); color: white;
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar img { height: 28px; }
    .top-bar-title { font-size: 15px; font-weight: 700; flex: 1; }
    .top-bar-time  { font-size: 13px; opacity: 0.7; font-variant-numeric: tabular-nums; }

    /* ── View tabs ── */
    .view-tabs {
      display: flex; background: white; border-bottom: 2px solid #dce3ea;
    }
    .view-tab {
      flex: 1; padding: 11px 8px; text-align: center; font-size: 13px; font-weight: 600;
      color: var(--rmd-muted); cursor: pointer; border: none; background: none;
      border-bottom: 3px solid transparent; margin-bottom: -2px; font-family: var(--font);
    }
    .view-tab.active { color: var(--rmd-blue); border-bottom-color: var(--rmd-blue); }

    /* ── Room strip ── */
    .room-strip {
      display: flex; gap: 8px; padding: 10px 14px; background: white;
      border-bottom: 1px solid #dce3ea; overflow-x: auto;
    }
    .room-btn {
      padding: 6px 16px; border-radius: 20px; border: 2px solid #dce3ea;
      background: white; font-size: 13px; font-weight: 700; font-family: var(--font);
      color: var(--rmd-muted); cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .room-btn.active { background: var(--rmd-navy); color: white; border-color: var(--rmd-navy); }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Assessment table ── */
    .table-wrap { overflow-x: auto; }

    table.atbl {
      border-collapse: collapse; width: 100%; min-width: 640px; background: white;
    }

    table.atbl th:first-child,
    table.atbl td:first-child {
      position: sticky; left: 0; z-index: 2; background: white;
      border-right: 2px solid #dce3ea;
      min-width: 130px; max-width: 130px; width: 130px;
    }
    table.atbl th:first-child { background: var(--rmd-navy); }

    table.atbl th {
      background: var(--rmd-navy); color: white;
      padding: 9px 8px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.4px; font-weight: 700; text-align: center; white-space: nowrap;
    }
    table.atbl th:first-child { text-align: left; padding-left: 12px; }

    table.atbl td {
      padding: 8px 6px; border-bottom: 1px solid #f0f3f6;
      text-align: center; vertical-align: middle;
    }
    table.atbl td:first-child {
      text-align: left; padding-left: 12px;
      font-size: 13px; font-weight: 700; color: var(--rmd-navy);
    }
    table.atbl tr:hover td           { background: #f8f9fb; }
    table.atbl tr:hover td:first-child { background: #f8f9fb; }

    table.atbl tr.notes-row td {
      padding: 0; border-bottom: 2px solid #dce3ea; background: #f8f9fb;
    }
    table.atbl tr.notes-row td:first-child { background: #f8f9fb; border-right: none; }

    /* ── Traffic lights ── */
    .tl-cell { display: flex; gap: 4px; justify-content: center; align-items: center; }
    .tl {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid #dce3ea; background: white;
      font-size: 10px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.1s; color: #aab8c2; flex-shrink: 0;
    }
    .tl:active { transform: scale(0.88); }
    .tl.g { color: #1a6e31; border-color: #b5d9bc; }
    .tl.a { color: #c17a00; border-color: #f5d48a; }
    .tl.r { color: #b7410e; border-color: #f4bfb6; }
    .tl.g.on { background: #1a6e31; border-color: #1a6e31; color: white; }
    .tl.a.on { background: #c17a00; border-color: #c17a00; color: white; }
    .tl.r.on { background: #b7410e; border-color: #b7410e; color: white; }

    /* ── Overall badge ── */
    .overall-badge {
      display: inline-block; padding: 4px 10px; border-radius: 12px;
      font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
      transition: all 0.1s;
    }
    .overall-badge:active { transform: scale(0.93); }
    .overall-none  { background: #f0f3f6; color: #aab8c2; }
    .overall-green { background: #e6f4ea; color: #1a6e31; }
    .overall-amber { background: #fff3cd; color: #856404; }
    .overall-red   { background: #fde8e4; color: #b7410e; }

    /* ── Flags ── */
    .flag-cell { display: flex; gap: 4px; justify-content: center; }
    .fl {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #dce3ea; background: white;
      font-size: 13px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.1s; opacity: 0.35;
    }
    .fl:active { transform: scale(0.88); }
    .fl.on { opacity: 1; border-color: transparent; }
    .fl.concern.on  { background: #fde8e4; }
    .fl.standout.on { background: #e6f4ea; }

    /* ── Notes button ── */
    .notes-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #dce3ea; background: white;
      font-size: 13px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.1s; opacity: 0.4;
    }
    .notes-btn:active { transform: scale(0.88); }
    .notes-btn.has-notes { opacity: 1; background: #e8f0fe; border-color: var(--rmd-blue); }
    .notes-btn.open { opacity: 1; background: var(--rmd-blue); border-color: var(--rmd-blue); }

    /* ── Notes panel ── */
    .notes-panel { padding: 10px 12px; }
    .notes-req { font-size: 11px; color: #b7410e; font-weight: 700; margin-bottom: 6px; display: none; }
    .notes-req.show { display: block; }
    textarea.notes-ta {
      width: 100%; min-height: 72px; padding: 9px 10px;
      border: 2px solid #ccd6dd; border-radius: 6px;
      font-size: 14px; font-family: var(--font); resize: vertical; color: var(--rmd-navy);
    }
    textarea.notes-ta:focus { outline: none; border-color: var(--rmd-blue); }
    textarea.notes-ta.required { border-color: #b7410e; }

    /* ── Save indicator ── */
    .save-ind {
      font-size: 10px; font-weight: 700; margin-left: 4px;
      color: #34a853; opacity: 0; transition: opacity 0.3s;
    }
    .save-ind.show { opacity: 1; }

    /* ── Legend ── */
    .legend {
      display: flex; gap: 12px; flex-wrap: wrap; padding: 8px 14px;
      font-size: 11px; color: var(--rmd-muted); background: white;
      border-bottom: 1px solid #dce3ea; align-items: center;
    }
    .legend span { display: flex; align-items: center; gap: 4px; }

    /* ── Overview ── */
    .hist-wrap { padding: 12px 14px; }
    .cand-card {
      background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 10px; overflow: hidden;
    }
    .cand-card-header {
      padding: 10px 14px; display: flex; align-items: center; gap: 8px;
      cursor: pointer; border-bottom: 1px solid #f0f3f6;
    }
    .cand-card-name { font-size: 14px; font-weight: 700; color: var(--rmd-navy); flex: 1; }
    .cand-card-body { padding: 10px 14px; display: none; }
    .cand-card-body.open { display: block; }

    .traj-grid {
      display: grid; grid-template-columns: 90px repeat(5, 1fr);
      gap: 3px; font-size: 11px; margin-bottom: 10px;
    }
    .traj-hdr  { text-align: center; font-weight: 700; color: var(--rmd-muted); font-size: 10px; padding: 2px; }
    .traj-dim  { font-size: 10px; color: var(--rmd-muted); text-align: right; padding-right: 4px; align-self: center; }
    .traj-cell {
      height: 22px; border-radius: 4px; display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 700;
    }
    .tc-none  { background: #f0f3f6; color: #aab8c2; }
    .tc-green { background: #1a6e31; color: white; }
    .tc-amber { background: #c17a00; color: white; }
    .tc-red   { background: #b7410e; color: white; }

    .stream-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      text-transform: uppercase;
    }
    .stream-ic  { background: #e8f0fe; color: #3d52a0; }
    .stream-itc { background: #f3e8fd; color: #6b3d9a; }

    .empty-state { text-align: center; padding: 40px; color: var(--rmd-muted); font-size: 14px; }
    .loading     { text-align: center; padding: 40px; color: var(--rmd-muted); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 24px; font-size: 14px; font-weight: 700;
      color: white; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    #toast.show  { opacity: 1; }
    #toast.green { background: #34a853; }
    #toast.amber { background: #e65c00; }
    #toast.red   { background: #ea4335; }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="timetable.html" style="display:flex;align-items:center;text-decoration:none;" id="logoLink">
    <img src="assets/rmd-logo.png" alt="RMD" height="32"
         onerror="document.getElementById('logoLink').innerHTML='<span style=\'color:white;font-size:13px;font-weight:900;border:2px solid rgba(255,255,255,0.7);padding:3px 8px;border-radius:4px;letter-spacing:1px;\'>RMD</span>'">
  </a>
  <div class="top-bar-title">Instructor Development</div>
  <div class="top-bar-time" id="topBarTime">--:--</div>
</div>

<div class="view-tabs">
  <button class="view-tab active" onclick="switchView('assess')"   id="vtab-assess">📋 Assessment</button>
  <button class="view-tab"        onclick="switchView('overview')" id="vtab-overview">📈 Overview</button>
</div>

<!-- ── ASSESSMENT VIEW ── -->
<div class="view active" id="view-assess">
  <div class="room-strip" id="roomStrip"></div>
  <div class="legend">
    <span><span style="width:12px;height:12px;border-radius:50%;background:#1a6e31;display:inline-block;"></span> On track</span>
    <span><span style="width:12px;height:12px;border-radius:50%;background:#c17a00;display:inline-block;"></span> Developing</span>
    <span><span style="width:12px;height:12px;border-radius:50%;background:#b7410e;display:inline-block;"></span> Concern</span>
    <span>· Tap 📝 for notes · Notes required for ⚠️</span>
  </div>
  <div class="table-wrap">
    <table class="atbl" id="assessTable">
      <thead>
        <tr>
          <th>Candidate</th>
          <th>Sat<br>Teach</th>
          <th>Sat<br>Debrief</th>
          <th>Sun<br>Teach</th>
          <th>Sun<br>ITC obs</th>
          <th>Sun<br>Final</th>
          <th>Overall</th>
          <th>Flag</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="assessBody">
        <tr><td colspan="9"><div class="loading">Loading…</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── OVERVIEW VIEW ── -->
<div class="view" id="view-overview">
  <div class="room-strip" id="ovRoomStrip"></div>
  <div class="hist-wrap" id="overviewBody"></div>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>

// ── URL params ──────────────────────────────────────────────────────────────
const params     = new URLSearchParams(window.location.search);
const myRole     = (params.get("role") || "faculty").toLowerCase();
const myRoom     = (params.get("room") || "").toUpperCase();
const isDirector = myRole === "director";

// ── Checkpoints ─────────────────────────────────────────────────────────────
const CHECKPOINTS = [
  { id: "sat-teach",   label: "Sat Teach"   },
  { id: "sat-debrief", label: "Sat Debrief" },
  { id: "sun-teach",   label: "Sun Teach"   },
  { id: "sun-itc",     label: "Sun ITC obs" },
  { id: "sun-final",   label: "Sun Final"   }
];

// ── State ───────────────────────────────────────────────────────────────────
var candidates    = [];       // [{id, name, stream, room}]
var assessments   = {};       // {candidateId: {ratings, flags, notes, overallOverride}}
var allRooms      = [];
var currentRoom   = myRoom || "all";
var currentOvRoom = "all";
var saveTimers    = {};       // per-candidate debounce for notes
var unsubscribe   = null;

// ── Boot ────────────────────────────────────────────────────────────────────
var authResolved = false;

const authTimeout = setTimeout(() => {
  if (!authResolved) {
    console.warn("Auth timeout — running in demo mode.");
    authResolved = true;
    boot();
  }
}, 5000);

const firebaseReady = initFirebase();

if (!firebaseReady) {
  authResolved = true;
  clearTimeout(authTimeout);
  boot();
} else {
  auth.onAuthStateChanged(user => {
    if (authResolved) return;
    authResolved = true;
    clearTimeout(authTimeout);
    if (user) {
      boot();
    } else {
      // Demo mode with sign-in prompt
      document.querySelector(".view-tabs").insertAdjacentHTML("beforebegin",
        `<div style="background:#fff3cd;color:#856404;padding:8px 16px;font-size:12px;text-align:center;font-weight:600;">
          Demo mode · <a href="index.html" style="color:#856404;">Sign in</a> to save real data
        </div>`);
      boot();
    }
  });
}

async function boot() {
  updateClock();
  setInterval(updateClock, 10000);
  await loadCandidates();
  buildRoomStrips();
  startListener();
}

// ── Load candidates ──────────────────────────────────────────────────────────
async function loadCandidates() {
  try {
    const snap = await db.collection(COLLECTIONS.people).get();
    if (!snap.empty) {
      candidates = snap.docs.map(d => {
        const data = d.data();
        return {
          id:     d.id,
          name:   data.name   || d.id,
          stream: data.stream || "Instructor Candidate",
          room:   (data.room  || "").toUpperCase()
        };
      }).sort((a, b) => a.name.localeCompare(b.name));
    } else {
      loadDemo();
    }
  } catch (err) {
    console.warn("Could not load people, using demo data:", err);
    loadDemo();
  }
  const roomSet = new Set(candidates.map(c => c.room).filter(Boolean));
  allRooms = Array.from(roomSet).sort();
  if (!myRoom && allRooms.length) currentRoom = "all";
}

function loadDemo() {
  const rooms = ["CM01","CM02","CM03","CM04","CM13","CM14","CM15","CM16"];
  const names = [
    ["Dr A. Ahmed","CM01"],["Dr B. Brennan","CM01"],
    ["Dr C. Carter","CM02"],["Dr D. Davies","CM02"],
    ["Dr E. Evans","CM03"],["Dr F. Fletcher","CM03"],
    ["Dr G. Green","CM04"],["Dr H. Harris","CM04"],
    ["Dr I. Ingram","CM13"],["Dr J. Jones","CM13"],
    ["Dr K. Khan","CM14"],["Dr L. Lewis","CM14"],
    ["Dr M. Morgan","CM15"],["Dr N. Nguyen","CM15"],
    ["Dr O. Okafor","CM16"],["Dr P. Patel","CM16"]
  ];
  candidates = names.map(([name, room], i) => ({
    id: "demo_" + (i + 1),
    name,
    stream: i % 5 === 0 ? "ITC" : "Instructor Candidate",
    room
  }));
  allRooms = rooms;
}

// ── Room strips ──────────────────────────────────────────────────────────────
function buildRoomStrips() {
  const rooms = isDirector ? ["all", ...allRooms] : (myRoom ? [myRoom] : ["all", ...allRooms]);

  const makeBtn = (r, prefix, active) =>
    `<button class="room-btn ${active?'active':''}" id="${prefix}-${r}" onclick="${prefix==='room'?'setRoom':'setOvRoom'}('${r}')">${r === 'all' ? 'All rooms' : r}</button>`;

  document.getElementById("roomStrip").innerHTML   = rooms.map(r => makeBtn(r, "room",   r === currentRoom)).join("");
  document.getElementById("ovRoomStrip").innerHTML = ["all",...allRooms].map(r => makeBtn(r, "ovroom", r === currentOvRoom)).join("");
}

// ── Firestore listener ───────────────────────────────────────────────────────
function startListener() {
  if (unsubscribe) unsubscribe();
  unsubscribe = db.collection("development_assessments")
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if (change.type === "removed") {
          delete assessments[change.doc.id];
        } else {
          const data = change.doc.data();
          assessments[change.doc.id] = {
            ratings:         data.ratings         || {},
            flags:           data.flags           || {},
            notes:           data.notes           || "",
            overallOverride: data.overallOverride || null
          };
        }
      });
      renderAssessTable();
      if (document.getElementById("view-overview").classList.contains("active")) {
        renderOverview();
      }
    }, err => {
      console.error("Listener error:", err);
      renderAssessTable();
    });
}

// ── Room filter ──────────────────────────────────────────────────────────────
function setRoom(r) {
  currentRoom = r;
  document.querySelectorAll(".room-btn[id^='room-']").forEach(b => b.classList.remove("active"));
  const el = document.getElementById("room-" + r);
  if (el) el.classList.add("active");
  renderAssessTable();
}

function setOvRoom(r) {
  currentOvRoom = r;
  document.querySelectorAll(".room-btn[id^='ovroom-']").forEach(b => b.classList.remove("active"));
  const el = document.getElementById("ovroom-" + r);
  if (el) el.classList.add("active");
  renderOverview();
}

function visibleCandidates(room) {
  if (room === "all") return candidates;
  return candidates.filter(c => c.room === room);
}

// ── Assessment table ─────────────────────────────────────────────────────────
function renderAssessTable() {
  const tbody = document.getElementById("assessBody");
  const cands = visibleCandidates(currentRoom);
  if (cands.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--rmd-muted);">No candidates in this room.</td></tr>`;
    return;
  }
  // Preserve which notes panels are open
  const openNotes = new Set();
  document.querySelectorAll(".notes-row").forEach(row => {
    if (row.style.display !== "none") openNotes.add(row.id.replace("notes-row-",""));
  });
  tbody.innerHTML = cands.map(c => buildCandidateRows(c, openNotes.has(c.id))).join("");
}

function buildCandidateRows(c, notesOpen) {
  const s  = getA(c.id);
  const streamCls = (c.stream === "ITC" || c.stream === "Instructor Trainer Candidate") ? "stream-itc" : "stream-ic";
  const streamLbl = (c.stream === "ITC" || c.stream === "Instructor Trainer Candidate") ? "ITC" : "IC";

  const cpCells = CHECKPOINTS.map(cp => {
    const v = s.ratings[cp.id] || null;
    return `<td><div class="tl-cell">
      <button class="tl g ${v==='green'?'on':''}" onclick="setRating('${c.id}','${cp.id}','green')" title="On track">G</button>
      <button class="tl a ${v==='amber'?'on':''}" onclick="setRating('${c.id}','${cp.id}','amber')" title="Developing">A</button>
      <button class="tl r ${v==='red'?'on':''}"   onclick="setRating('${c.id}','${cp.id}','red')"   title="Concern">R</button>
    </div></td>`;
  }).join("");

  const ov     = computeOverall(c.id);
  const ovCls  = {green:"overall-green",amber:"overall-amber",red:"overall-red"}[ov] || "overall-none";
  const ovLbl  = {green:"🟢 On track",amber:"🟡 Developing",red:"🔴 Concern"}[ov] || "–";
  const hasNotes = s.notes && s.notes.trim().length > 0;
  const nbCls    = "notes-btn" + (notesOpen ? " open" : hasNotes ? " has-notes" : "");

  return `
    <tr id="row-${c.id}">
      <td>
        ${c.name}
        <br><span class="stream-badge ${streamCls}">${streamLbl}</span>
        <span style="font-size:10px;color:var(--rmd-muted);"> ${c.room}</span>
      </td>
      ${cpCells}
      <td><span class="overall-badge ${ovCls}" onclick="cycleOverall('${c.id}')">${ovLbl}</span></td>
      <td>
        <div class="flag-cell">
          <button class="fl concern ${s.flags.concern?'on':''}"   onclick="toggleFlag('${c.id}','concern')"  title="Concern">⚠️</button>
          <button class="fl standout ${s.flags.standout?'on':''}" onclick="toggleFlag('${c.id}','standout')" title="Standout">⭐</button>
        </div>
      </td>
      <td><button class="${nbCls}" id="nbtn-${c.id}" onclick="toggleNotes('${c.id}')" title="Notes">📝</button></td>
    </tr>
    <tr class="notes-row" id="notes-row-${c.id}" style="${notesOpen?'':'display:none;'}">
      <td colspan="9">
        <div class="notes-panel">
          <div class="notes-req ${s.flags.concern?'show':''}" id="notes-req-${c.id}">⚠️ Notes required when concern is flagged</div>
          <textarea class="notes-ta ${s.flags.concern&&!s.notes.trim()?'required':''}" id="notes-ta-${c.id}"
            placeholder="Observations, teaching moments, development areas…"
            oninput="scheduleNoteSave('${c.id}')"
            onblur="flushNoteSave('${c.id}')">${s.notes||""}</textarea>
          <div style="font-size:11px;color:#34a853;margin-top:4px;min-height:14px;" id="save-ind-${c.id}"></div>
        </div>
      </td>
    </tr>`;
}

// ── Get/init assessment state ─────────────────────────────────────────────────
function getA(id) {
  if (!assessments[id]) assessments[id] = { ratings: {}, flags: {}, notes: "", overallOverride: null };
  return assessments[id];
}

// ── Firestore write helpers ──────────────────────────────────────────────────
async function saveField(candidateId, data) {
  try {
    await db.collection("development_assessments").doc(candidateId).set(
      { ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: auth.currentUser ? auth.currentUser.uid : null },
      { merge: true }
    );
  } catch (err) {
    showToast("Save failed — check connection", "red");
    console.error(err);
  }
}

// ── Traffic lights ───────────────────────────────────────────────────────────
async function setRating(cid, cpId, val) {
  const s = getA(cid);
  if (s.ratings[cpId] === val) {
    delete s.ratings[cpId];
  } else {
    s.ratings[cpId] = val;
  }
  // Optimistic local update
  refreshRow(cid);
  await saveField(cid, { ratings: s.ratings });
}

function computeOverall(cid) {
  const s = getA(cid);
  if (s.overallOverride) return s.overallOverride;
  const vals = Object.values(s.ratings);
  if (vals.length === 0) return null;
  if (vals.includes("red"))   return "red";
  if (vals.includes("amber")) return "amber";
  return "green";
}

async function cycleOverall(cid) {
  const s   = getA(cid);
  const seq = [null, "green", "amber", "red"];
  const idx = seq.indexOf(s.overallOverride);
  s.overallOverride = seq[(idx + 1) % seq.length];
  refreshRow(cid);
  await saveField(cid, { overallOverride: s.overallOverride });
}

// ── Flags ────────────────────────────────────────────────────────────────────
async function toggleFlag(cid, flag) {
  const s = getA(cid);
  s.flags[flag] = !s.flags[flag];
  refreshRow(cid);
  if (flag === "concern" && s.flags.concern) openNotes(cid);
  await saveField(cid, { flags: s.flags });
}

// ── Notes ────────────────────────────────────────────────────────────────────
function toggleNotes(cid) {
  const row = document.getElementById("notes-row-" + cid);
  if (!row) return;
  if (row.style.display !== "none") {
    flushNoteSave(cid);
    row.style.display = "none";
    const btn = document.getElementById("nbtn-" + cid);
    if (btn) btn.classList.remove("open");
  } else {
    openNotes(cid);
  }
}

function openNotes(cid) {
  const row = document.getElementById("notes-row-" + cid);
  if (!row) return;
  row.style.display = "";
  const btn = document.getElementById("nbtn-" + cid);
  if (btn) { btn.classList.remove("has-notes"); btn.classList.add("open"); }
  const reqEl = document.getElementById("notes-req-" + cid);
  if (reqEl) reqEl.classList.toggle("show", !!(getA(cid).flags.concern));
  const ta = document.getElementById("notes-ta-" + cid);
  if (ta) setTimeout(() => ta.focus(), 50);
}

function scheduleNoteSave(cid) {
  if (saveTimers[cid]) clearTimeout(saveTimers[cid]);
  saveTimers[cid] = setTimeout(() => flushNoteSave(cid), 1500);
}

async function flushNoteSave(cid) {
  if (saveTimers[cid]) { clearTimeout(saveTimers[cid]); delete saveTimers[cid]; }
  const ta = document.getElementById("notes-ta-" + cid);
  if (!ta) return;
  const s = getA(cid);
  s.notes = ta.value;
  const btn = document.getElementById("nbtn-" + cid);
  if (btn) btn.classList.toggle("has-notes", s.notes.trim().length > 0);
  if (s.flags.concern) ta.classList.toggle("required", s.notes.trim().length === 0);
  await saveField(cid, { notes: s.notes });
  const ind = document.getElementById("save-ind-" + cid);
  if (ind) { ind.textContent = "✓ Saved"; setTimeout(() => { ind.textContent = ""; }, 2000); }
}

// ── Row refresh ───────────────────────────────────────────────────────────────
function refreshRow(cid) {
  const c = candidates.find(x => x.id === cid);
  if (!c) return;
  const notesOpen = document.getElementById("notes-row-" + cid) &&
                    document.getElementById("notes-row-" + cid).style.display !== "none";
  const existRow  = document.getElementById("row-" + cid);
  const existNRow = document.getElementById("notes-row-" + cid);
  if (!existRow) return;
  const temp = document.createElement("tbody");
  temp.innerHTML = buildCandidateRows(c, notesOpen);
  existRow.replaceWith(temp.children[0]);
  existNRow.replaceWith(temp.children[0]);
}

// ── Overview ──────────────────────────────────────────────────────────────────
function renderOverview() {
  const cands = visibleCandidates(currentOvRoom);
  const body  = document.getElementById("overviewBody");
  if (cands.length === 0) {
    body.innerHTML = `<div class="empty-state">No candidates in this room.</div>`;
    return;
  }
  const cpShorts = ["S:T","S:D","Su:T","Su:I","Su:F"];
  body.innerHTML = cands.map((c, ci) => {
    const s  = getA(c.id);
    const ov = computeOverall(c.id);
    const ovCls = {green:"overall-green",amber:"overall-amber",red:"overall-red"}[ov] || "overall-none";
    const ovLbl = {green:"🟢 On track",amber:"🟡 Developing",red:"🔴 Concern"}[ov] || "No data";
    const streamCls = (c.stream === "ITC" || c.stream === "Instructor Trainer Candidate") ? "stream-itc" : "stream-ic";
    const streamLbl = (c.stream === "ITC" || c.stream === "Instructor Trainer Candidate") ? "ITC" : "IC";

    const flagHtml = [
      s.flags.concern  ? `<span style="font-size:12px;padding:2px 8px;border-radius:10px;background:#fde8e4;color:#b7410e;font-weight:700;">⚠️ Concern</span>`  : "",
      s.flags.standout ? `<span style="font-size:12px;padding:2px 8px;border-radius:10px;background:#e6f4ea;color:#1a6e31;font-weight:700;">⭐ Standout</span>` : ""
    ].filter(Boolean).join(" ");

    const trajCells = cpShorts.map((sh, i) => {
      const cp  = CHECKPOINTS[i];
      const v   = s.ratings[cp.id];
      const cls = {green:"tc-green",amber:"tc-amber",red:"tc-red"}[v] || "tc-none";
      const lbl = {green:"G",amber:"A",red:"R"}[v] || "–";
      return `<div class="traj-cell ${cls}">${lbl}</div>`;
    }).join("");

    return `
      <div class="cand-card">
        <div class="cand-card-header" onclick="toggleOverviewCard('ovc-${ci}')">
          <div class="cand-card-name">
            ${c.name}
            <span class="stream-badge ${streamCls}" style="margin-left:6px;">${streamLbl}</span>
            <span style="font-size:11px;font-weight:400;color:var(--rmd-muted);margin-left:4px;">${c.room}</span>
          </div>
          <span class="overall-badge ${ovCls}" style="cursor:default;">${ovLbl}</span>
        </div>
        <div class="cand-card-body" id="ovc-${ci}">
          <div class="traj-grid">
            <div></div>
            ${cpShorts.map(sh => `<div class="traj-hdr">${sh}</div>`).join("")}
            <div class="traj-dim">RAG</div>
            ${trajCells}
          </div>
          ${flagHtml ? `<div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap;">${flagHtml}</div>` : ""}
          ${s.notes ? `<div style="margin-top:8px;font-size:13px;color:#456b8c;background:#f5f7fa;border-radius:6px;padding:8px 10px;">${s.notes}</div>` : ""}
        </div>
      </div>`;
  }).join("");
}

function toggleOverviewCard(id) {
  document.getElementById(id).classList.toggle("open");
}

// ── View switching ─────────────────────────────────────────────────────────
function switchView(v) {
  document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".view-tab").forEach(el => el.classList.remove("active"));
  document.getElementById("view-" + v).classList.add("active");
  document.getElementById("vtab-" + v).classList.add("active");
  if (v === "overview") renderOverview();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
var toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className   = `show ${type}`;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = type; }, 2200);
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("topBarTime").textContent =
    String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
}

</script>
