<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMD Instructor Weekend 2026</title>
  <link rel="stylesheet" href="css/rmd.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <img src="assets/rmd-logo.png" alt="RMD logo" class="login-logo">
    <h1 class="login-title">RMD Instructor Weekend</h1>
    <p class="login-subtitle">Birmingham · 9–11 October 2026</p>

    <!-- Faculty login -->
    <div id="facultyLoginView">
      <form class="login-form" onsubmit="handleFacultyLogin(event)">
        <input class="form-input" type="email" id="loginEmail" placeholder="Email address" required autocomplete="email">
        <input class="form-input" type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
        <button type="submit" class="btn-login">Sign in</button>
      </form>
      <p id="loginError" style="color:var(--rmd-warn);font-size:13px;margin-top:10px;display:none;"></p>

      <hr class="login-divider">
      <p class="qr-hint">Candidates: use the personal link from your email, or scan the QR code at registration.</p>
    </div>

    <!-- Candidate QR landing (shown when ?id=xxx in URL) -->
    <div id="candidateView" class="hidden">
      <div style="font-size:48px;margin:16px 0;">✅</div>
      <h2 style="color:var(--rmd-navy);margin-bottom:8px;">Welcome!</h2>
      <p id="candidateName" style="font-size:18px;font-weight:700;color:var(--rmd-blue);margin-bottom:4px;"></p>
      <p id="candidateStream" style="font-size:13px;color:var(--rmd-muted);margin-bottom:20px;"></p>
      <p style="font-size:13px;color:var(--rmd-muted);margin-bottom:16px;">Your arrival has been recorded.</p>
      <button class="btn-login" onclick="goToTimetable()">View Timetable →</button>
    </div>

  </div>

  <p style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:20px;">
    RMD · Resuscitation. Mentorship. Development. · University of Birmingham
  </p>
</div>

<script src="js/firebase-config.js"></script>
<script>
  // ── Check for candidate QR code ─────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const candidateId = params.get("id");

  if (candidateId) {
    // Show candidate welcome view, hide faculty login
    document.getElementById("facultyLoginView").classList.add("hidden");
    document.getElementById("candidateView").classList.remove("hidden");
    loadCandidateProfile(candidateId);
  }

  async function loadCandidateProfile(id) {
    // TODO: fetch from Firebase
    // const doc = await db.collection(COLLECTIONS.people).doc(id).get();
    // const data = doc.data();

    // Demo fallback
    const demo = { name: "Dr A. Candidate", stream: "Instructor Candidate" };
    document.getElementById("candidateName").textContent = demo.name;
    document.getElementById("candidateStream").textContent = demo.stream;

    // Record arrival timestamp
    // db.collection(COLLECTIONS.attendance).doc(id).set({
    //   saturdayArrival: firebase.firestore.FieldValue.serverTimestamp()
    // }, { merge: true });
  }

  function goToTimetable() {
    window.location.href = `timetable.html?role=instructor&id=${candidateId}`;
  }

  // ── Faculty login ────────────────────────────────────────────────────────────
  async function handleFacultyLogin(e) {
    e.preventDefault();
    const email    = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const errEl    = document.getElementById("loginError");
    errEl.style.display = "none";

    // TODO: authenticate with Firebase
    // try {
    //   const result = await auth.signInWithEmailAndPassword(email, password);
    //   const role = await getUserRole(result.user.uid);
    //   window.location.href = `timetable.html?role=${role}`;
    // } catch (err) {
    //   errEl.textContent = "Sign in failed. Check your email and password.";
    //   errEl.style.display = "block";
    // }

    // Demo: route by email prefix
    if (email.includes("director") || email === "jon") {
      window.location.href = "timetable.html?role=director";
    } else {
      window.location.href = "timetable.html?role=faculty";
    }
  }
</script>
</body>
</html>
