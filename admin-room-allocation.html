<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Allocation — RMD Instructor Weekend 2026</title>
  <link rel="stylesheet" href="css/rmd.css">
  <style>
    body { background: #f0f2f7; margin: 0; padding: 0; }

    /* ── Toolbar ── */
    .ra-toolbar {
      background: var(--rmd-navy);
      color: #fff;
      padding: 11px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .ra-toolbar-back {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
    }
    .ra-toolbar-back:hover { color: #fff; }
    .ra-toolbar h1 {
      font-size: 16px;
      font-weight: 800;
      flex: 1;
      margin: 0;
      white-space: nowrap;
    }
    .ra-toolbar-btn {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: none;
      padding: 7px 13px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
    }
    .ra-toolbar-btn:hover { background: rgba(255,255,255,0.24); }
    .ra-toolbar-btn.save {
      background: var(--rmd-red);
    }
    .ra-toolbar-btn.save:hover { background: #a93226; }
    #saveStatus {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      min-width: 80px;
    }
    #saveStatus.ok  { color: #4ade80; }
    #saveStatus.err { color: #f87171; }

    /* ── Stats bar ── */
    .ra-stats {
      background: rgba(13, 32, 53, 0.88);
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      padding: 5px 18px;
      display: flex;
      gap: 20px;
    }
    .ra-stats b { color: #fff; }

    /* ── Layout ── */
    .ra-layout {
      display: flex;
      gap: 0;
      height: calc(100vh - 74px);
    }

    /* ── Pool panel ── */
    .ra-pool {
      width: 230px;
      min-width: 180px;
      background: #fff;
      border-right: 2px solid #dde1ec;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .ra-pool-header {
      padding: 10px 14px;
      background: #e8ecf4;
      border-bottom: 1px solid #d5daea;
      font-weight: 800;
      font-size: 13px;
      color: var(--rmd-navy);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pool-badge {
      background: var(--rmd-navy);
      color: #fff;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .ra-pool-search { padding: 8px 8px 4px; }
    .ra-pool-search input {
      width: 100%;
      padding: 6px 10px;
      border: 1.5px solid #d0d5e0;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
      font-family: var(--font);
    }
    .ra-pool-search input:focus { border-color: var(--rmd-blue); }
    .ra-pool-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    .pool-empty {
      padding: 24px 10px;
      text-align: center;
      color: #b0b8cc;
      font-size: 12px;
    }

    /* ── Person cards ── */
    .person-card {
      background: #f7f9fc;
      border: 1.5px solid #dde2ed;
      border-radius: 6px;
      padding: 6px 8px 6px 10px;
      margin-bottom: 4px;
      font-size: 13px;
      font-family: var(--font);
      cursor: grab;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.1s, border-color 0.1s, opacity 0.15s;
      line-height: 1.3;
    }
    .person-card:hover { background: #edf1f9; border-color: #b8c2d8; }
    .person-card.is-dragging { opacity: 0.35; }
    .person-card.selected {
      background: #dbeafe;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.18);
    }
    .card-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-remove {
      background: none;
      border: none;
      color: #c0c8d8;
      cursor: pointer;
      padding: 0 2px 0 6px;
      font-size: 15px;
      line-height: 1;
      flex-shrink: 0;
      font-family: var(--font);
    }
    .card-remove:hover { color: var(--rmd-red); }

    /* ── Rooms grid ── */
    .ra-rooms {
      flex: 1;
      overflow: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      align-content: start;
    }

    .room-col {
      background: #fff;
      border: 1.5px solid #dde2ed;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      min-height: 200px;
      overflow: hidden;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .room-col.drag-over {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      background: #f0f6ff;
    }
    .room-col.click-target {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
    }

    .room-head {
      background: var(--rmd-navy);
      color: #fff;
      padding: 9px 11px 8px;
      flex-shrink: 0;
    }
    .room-head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .room-id {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .room-cand-count {
      font-size: 11px;
      opacity: 0.55;
      font-weight: 600;
    }
    .faculty-sel {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 5px;
      color: #fff;
      font-size: 12px;
      padding: 4px 6px;
      cursor: pointer;
      font-family: var(--font);
      box-sizing: border-box;
    }
    .faculty-sel option { background: #152c45; color: #fff; }

    .room-body {
      flex: 1;
      padding: 6px;
      min-height: 80px;
    }
    .room-drop-hint {
      text-align: center;
      color: #c8cede;
      font-size: 12px;
      padding: 18px 8px;
    }

    /* ── Auth overlay ── */
    .auth-overlay {
      position: fixed; inset: 0;
      background: var(--rmd-navy);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      flex-direction: column;
      gap: 14px;
      color: #fff;
      font-family: var(--font);
    }
    .auth-msg {
      font-size: 15px;
      opacity: 0.7;
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .ra-rooms { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 820px) {
      .ra-rooms { grid-template-columns: repeat(2, 1fr); }
      .ra-layout { flex-direction: column; height: auto; }
      .ra-pool { width: 100%; border-right: none; border-bottom: 2px solid #dde1ec; max-height: 180px; flex-direction: row; }
      .ra-pool-header { writing-mode: initial; }
    }
  </style>
</head>
<body>

<!-- Auth overlay -->
<div id="authOverlay" class="auth-overlay">
  <div style="font-size:36px;">🏫</div>
  <div class="auth-msg" id="authMsg">Checking access…</div>
</div>

<!-- Toolbar -->
<div class="ra-toolbar">
  <a href="timetable.html" class="ra-toolbar-back">← Timetable</a>
  <h1>Room Allocation — Instructor Weekend 2026</h1>
  <span id="saveStatus"></span>
  <button class="ra-toolbar-btn" onclick="clearSelection()" id="clearSelBtn" style="display:none;">✕ Deselect</button>
  <button class="ra-toolbar-btn" onclick="autoDistribute()">⚡ Auto-distribute</button>
  <button class="ra-toolbar-btn" onclick="clearAllAllocations()">🗑 Clear all</button>
  <button class="ra-toolbar-btn save" onclick="saveAllocations()">💾 Save</button>
</div>

<!-- Stats bar -->
<div class="ra-stats">
  <div>Candidates: <b id="statTotal">—</b></div>
  <div>Assigned: <b id="statAssigned">0</b></div>
  <div>Unassigned: <b id="statUnassigned">—</b></div>
  <div id="selHint" style="display:none;">Select a room to assign highlighted candidate</div>
</div>

<!-- Main layout -->
<div class="ra-layout">

  <!-- Unassigned pool -->
  <div class="ra-pool">
    <div class="ra-pool-header">
      Unassigned
      <span class="pool-badge" id="poolCount">0</span>
    </div>
    <div class="ra-pool-search">
      <input type="search" id="poolSearch" placeholder="Search…" oninput="renderPool()">
    </div>
    <div class="ra-pool-list" id="poolList"
         ondragover="onDragOver(event, 'pool')"
         ondrop="onDrop(event, 'pool')">
      <div class="pool-empty" id="poolLoading">Loading…</div>
    </div>
  </div>

  <!-- Rooms -->
  <div class="ra-rooms" id="roomsGrid"></div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
const ROOMS = INSTRUCTOR_ROOMS; // ["CM01","CM02","CM03","CM04","CM13","CM14","CM15","CM16"]

let allCandidates = [];  // {name, email} from mou_roster where role="instructor"
let allFaculty    = [];  // {name, email} from mou_roster where role="faculty"/"full-instructor"
let groups = {};         // { CM01: { faculty: {name,email}|null, candidates:[{name,email}] } }
let dragging      = null;   // {email, source}
let selectedEmail = null;   // for click-to-move

ROOMS.forEach(r => { groups[r] = { faculty: null, candidates: [] }; });

// ── Init ───────────────────────────────────────────────────────────────────
const DIRECTOR_EMAILS = ["console_brews.6f@icloud.com"];

async function resolveRole(uid, email) {
  try {
    const snap = await db.collection(COLLECTIONS.people).doc(uid).get();
    if (snap.exists && snap.data().role) return snap.data().role;
  } catch (e) {}
  try {
    const cfg = await db.collection("config").doc("platform").get();
    const extra = cfg.exists ? (cfg.data().directors || []) : [];
    const all = [...DIRECTOR_EMAILS, ...extra.map(x => x.toLowerCase())];
    if (all.includes(email.toLowerCase())) return ROLES.DIRECTOR;
  } catch (e) {}
  if (DIRECTOR_EMAILS.includes(email.toLowerCase())) return ROLES.DIRECTOR;
  return null;
}

initFirebase();

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = "signin.html"; return; }

  const role = await resolveRole(user.uid, user.email || "");

  if (role !== ROLES.DIRECTOR) {
    document.getElementById("authMsg").textContent = "Course Directors only.";
    document.querySelector(".auth-overlay > div:first-child").textContent = "🚫";
    setTimeout(() => { window.location.href = "timetable.html"; }, 2000);
    return;
  }

  document.getElementById("authOverlay").style.display = "none";
  await loadData();
});

// ── Load data ──────────────────────────────────────────────────────────────
async function loadData() {
  // 1. Load MOU roster for candidate/faculty lists
  try {
    const snap = await db.collection(COLLECTIONS.mouRoster).get();
    snap.forEach(doc => {
      const d = doc.data();
      const p = { name: d.name || doc.id, email: d.email || doc.id };
      if (d.role === ROLES.INSTRUCTOR) {
        allCandidates.push(p);
      } else if (d.role === ROLES.FACULTY || d.role === "full-instructor") {
        allFaculty.push(p);
      }
    });
    allCandidates.sort((a, b) => a.name.localeCompare(b.name));
    allFaculty.sort((a, b) => a.name.localeCompare(b.name));
  } catch (e) {
    console.warn("Could not load mou_roster:", e.message);
  }

  // 2. Load existing allocations from groups collection
  try {
    const snap = await db.collection(COLLECTIONS.groups).get();
    snap.forEach(doc => {
      const rid = doc.id;
      if (groups[rid] !== undefined) {
        const d = doc.data();
        groups[rid].faculty    = d.faculty    || null;
        groups[rid].candidates = d.candidates || [];
      }
    });
  } catch (e) {
    console.warn("Could not load groups:", e.message);
  }

  render();
}

// ── Computed ───────────────────────────────────────────────────────────────
function assignedEmails() {
  const s = new Set();
  ROOMS.forEach(r => groups[r].candidates.forEach(c => s.add(c.email)));
  return s;
}

function unassigned() {
  const assigned = assignedEmails();
  return allCandidates.filter(c => !assigned.has(c.email));
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  renderPool();
  renderRooms();
  updateStats();
}

function renderPool() {
  const q    = (document.getElementById("poolSearch").value || "").toLowerCase();
  const list = unassigned().filter(c => !q || c.name.toLowerCase().includes(q));

  document.getElementById("poolCount").textContent  = unassigned().length;
  document.getElementById("poolLoading").style.display = "none";

  const listEl = document.getElementById("poolList");
  if (list.length === 0) {
    listEl.innerHTML = `<div class="pool-empty">${unassigned().length === 0 ? "All candidates assigned ✓" : "No matches"}</div>`;
  } else {
    listEl.innerHTML = list.map(c => personCard(c, "pool")).join("");
  }
}

function renderRooms() {
  document.getElementById("roomsGrid").innerHTML = ROOMS.map(rid => {
    const g = groups[rid];
    return `
      <div class="room-col" id="room-${rid}"
           ondragover="onDragOver(event,'${rid}')"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event,'${rid}')"
           onclick="onRoomClick('${rid}', event)">
        <div class="room-head">
          <div class="room-head-row">
            <span class="room-id">${rid}</span>
            <span class="room-cand-count" id="count-${rid}">${g.candidates.length} candidate${g.candidates.length !== 1 ? "s" : ""}</span>
          </div>
          <select class="faculty-sel" id="fac-${rid}" onchange="setFaculty('${rid}',this)" onclick="event.stopPropagation()">
            <option value="">— No faculty lead —</option>
            ${allFaculty.map(f =>
              `<option value="${f.email}"${g.faculty && g.faculty.email === f.email ? " selected" : ""}>${f.name}</option>`
            ).join("")}
          </select>
        </div>
        <div class="room-body" id="body-${rid}">
          ${g.candidates.length === 0
            ? `<div class="room-drop-hint">Drop candidates here</div>`
            : g.candidates.map(c => personCard(c, rid)).join("")}
        </div>
      </div>`;
  }).join("");
}

function personCard(person, source) {
  const sel = selectedEmail === person.email;
  return `<div class="person-card${sel ? " selected" : ""}"
               draggable="true"
               data-email="${person.email}"
               data-source="${source}"
               ondragstart="onDragStart(event,'${person.email}','${source}')"
               onclick="onCardClick(event,'${person.email}','${source}')">
            <span class="card-name">${person.name}</span>
            ${source !== "pool"
              ? `<button class="card-remove" onclick="removeFromRoom('${source}','${person.email}',event)" title="Return to pool">×</button>`
              : ""}
          </div>`;
}

function updateStats() {
  const total    = allCandidates.length;
  const assigned = assignedEmails().size;
  document.getElementById("statTotal").textContent      = total;
  document.getElementById("statAssigned").textContent   = assigned;
  document.getElementById("statUnassigned").textContent = total - assigned;
}

// ── Faculty ────────────────────────────────────────────────────────────────
function setFaculty(rid, sel) {
  const email = sel.value;
  if (!email) { groups[rid].faculty = null; return; }
  const f = allFaculty.find(x => x.email === email);
  groups[rid].faculty = f || null;
}

// ── Drag & drop ────────────────────────────────────────────────────────────
function onDragStart(event, email, source) {
  dragging = { email, source };
  event.dataTransfer.effectAllowed = "move";
  setTimeout(() => {
    const el = document.querySelector(`[data-email="${email}"]`);
    if (el) el.classList.add("is-dragging");
  }, 0);
}

function onDragOver(event, target) {
  event.preventDefault();
  event.dataTransfer.dropEffect = "move";
  const el = target === "pool"
    ? document.getElementById("poolList")
    : document.getElementById(`room-${target}`);
  if (el) el.classList.add("drag-over");
}

function onDragLeave(event) {
  // Only clear if leaving the element itself (not a child)
  if (!event.currentTarget.contains(event.relatedTarget)) {
    event.currentTarget.classList.remove("drag-over");
  }
}

function onDrop(event, target) {
  event.preventDefault();
  clearDragHighlights();
  if (!dragging) return;
  movePerson(dragging.email, dragging.source, target);
  dragging = null;
}

function clearDragHighlights() {
  document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
}

// ── Click-to-move ──────────────────────────────────────────────────────────
function onCardClick(event, email, source) {
  event.stopPropagation();
  if (selectedEmail === email) {
    clearSelection();
  } else {
    selectedEmail = email;
    document.getElementById("clearSelBtn").style.display = "";
    document.getElementById("selHint").style.display = "";
    // Highlight all rooms as click targets
    ROOMS.forEach(r => document.getElementById(`room-${r}`)?.classList.add("click-target"));
    render();
  }
}

function onRoomClick(rid, event) {
  if (!selectedEmail) return;
  event.stopPropagation();
  const source = findSource(selectedEmail);
  if (source === null) return;
  movePerson(selectedEmail, source, rid);
  clearSelection();
}

function clearSelection() {
  selectedEmail = null;
  document.getElementById("clearSelBtn").style.display = "none";
  document.getElementById("selHint").style.display = "none";
  document.querySelectorAll(".click-target").forEach(el => el.classList.remove("click-target"));
  render();
}

function findSource(email) {
  if (unassigned().some(c => c.email === email)) return "pool";
  for (const r of ROOMS) {
    if (groups[r].candidates.some(c => c.email === email)) return r;
  }
  return null;
}

// ── Move logic ─────────────────────────────────────────────────────────────
function movePerson(email, source, target) {
  if (source === target) return;
  const person = allCandidates.find(c => c.email === email);
  if (!person) return;

  // Remove from source room (pool is virtual - no removal needed)
  if (source !== "pool") {
    groups[source].candidates = groups[source].candidates.filter(c => c.email !== email);
  }

  // Add to target room (pool = just remove from room, already done)
  if (target !== "pool") {
    if (!groups[target].candidates.some(c => c.email === email)) {
      groups[target].candidates.push(person);
    }
  }

  render();
}

function removeFromRoom(rid, email, event) {
  event.stopPropagation();
  groups[rid].candidates = groups[rid].candidates.filter(c => c.email !== email);
  render();
}

// ── Auto-distribute ────────────────────────────────────────────────────────
function autoDistribute() {
  const pool = unassigned();
  if (pool.length === 0) {
    showStatus("All candidates already assigned", "ok");
    return;
  }
  // Shuffle for fairness, then fill smallest-first
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  shuffled.forEach(person => {
    const smallest = ROOMS.slice().sort((a, b) =>
      groups[a].candidates.length - groups[b].candidates.length
    )[0];
    groups[smallest].candidates.push(person);
  });
  render();
}

// ── Clear all ──────────────────────────────────────────────────────────────
function clearAllAllocations() {
  if (!confirm("Return all candidates to the unassigned pool?\n\nFaculty leads will be kept.")) return;
  ROOMS.forEach(r => { groups[r].candidates = []; });
  render();
}

// ── Save ───────────────────────────────────────────────────────────────────
async function saveAllocations() {
  showStatus("Saving…", "");
  try {
    const batch = db.batch();
    ROOMS.forEach(rid => {
      const ref = db.collection(COLLECTIONS.groups).doc(rid);
      batch.set(ref, {
        faculty:    groups[rid].faculty    || null,
        candidates: groups[rid].candidates || [],
        year:       CURRENT_MOU_YEAR,
        updatedAt:  firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy:  auth.currentUser ? auth.currentUser.uid : null
      });
    });
    await batch.commit();
    showStatus("✓ Saved", "ok");
  } catch (e) {
    console.error("Save failed:", e);
    showStatus("Save failed — check Firestore rules for 'groups' collection", "err");
  }
}

function showStatus(msg, cls) {
  const el = document.getElementById("saveStatus");
  el.textContent = msg;
  el.className   = cls;
  if (cls === "ok") setTimeout(() => { el.textContent = ""; el.className = ""; }, 3000);
}

// ── Cleanup ────────────────────────────────────────────────────────────────
document.addEventListener("dragend", () => {
  clearDragHighlights();
  document.querySelectorAll(".is-dragging").forEach(el => el.classList.remove("is-dragging"));
  dragging = null;
});
</script>

</body>
</html>
