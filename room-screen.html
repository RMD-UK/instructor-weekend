<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMD Room Screen</title>
  <link rel="stylesheet" href="css/rmd.css">
  <style>
    body { background: var(--rmd-navy); overflow: hidden; }
  </style>
</head>
<body>

<div class="room-screen" id="roomScreen">
  <div class="room-id" id="roomId">ROOM</div>
  <div class="session-name" id="sessionName">Waiting for session to begin…</div>
  <div class="big-timer" id="bigTimer">--:--</div>
  <div id="timerLabel" style="font-size:14px;opacity:0.6;margin-top:-8px;"></div>
  <div class="room-message hidden" id="roomMessage"></div>
  <img src="assets/rmd-logo.png" alt="RMD" class="rmd-logo-small">
</div>

<!-- Director control overlay (only shown when ?director=1 in URL) -->
<div id="directorOverlay" class="hidden" style="
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(0,0,0,0.85); padding:12px 16px;
  display:flex; gap:8px; align-items:center; flex-wrap:wrap; z-index:300;
">
  <span style="color:white;font-size:12px;font-weight:700;margin-right:4px;">⏱ Timer:</span>
  <button class="btn btn-sm" onclick="startTimer(5)">5m</button>
  <button class="btn btn-sm" onclick="startTimer(10)">10m</button>
  <button class="btn btn-sm" onclick="startTimer(15)">15m</button>
  <button class="btn btn-sm" onclick="startTimer(20)">20m</button>
  <button class="btn btn-sm" onclick="startTimer(30)">30m</button>
  <button class="btn btn-sm" onclick="startTimer(45)">45m</button>
  <button class="btn btn-sm" onclick="startTimer(60)">60m</button>
  <button class="btn btn-sm" onclick="startTimer(90)">90m</button>
  <button class="btn btn-sm btn-warn" onclick="stopTimer()">Stop</button>
  <span style="flex:1"></span>
  <input id="roomMsgInput" placeholder="Push message to this room…" style="
    flex:2;min-width:160px;padding:5px 10px;border:none;border-radius:4px;font-size:13px;
  ">
  <button class="btn btn-sm btn-amber" onclick="pushMessage()">Send</button>
  <button class="btn btn-sm" onclick="clearMessage()">Clear</button>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/programme-data.js"></script>
<script>
  // ── Parse URL params ────────────────────────────────────────────────────────
  const params     = new URLSearchParams(window.location.search);
  const roomParam  = params.get("room") || "WF15";
  const initMins   = parseInt(params.get("timer") || "0", 10);
  const initLabel  = params.get("label") || "";
  const isDirector = params.get("director") === "1";

  document.getElementById("roomId").textContent = roomParam.toUpperCase();
  if (initLabel) document.getElementById("sessionName").textContent = initLabel;
  if (isDirector) document.getElementById("directorOverlay").classList.remove("hidden");

  // ── Timer state ─────────────────────────────────────────────────────────────
  let timerEnd    = null;   // Date when timer expires
  let timerTick   = null;   // setInterval handle
  let clockTick   = null;   // clock update handle

  const timerEl = document.getElementById("bigTimer");
  const labelEl = document.getElementById("timerLabel");

  function startTimer(minutes) {
    clearInterval(timerTick);
    timerEnd = new Date(Date.now() + minutes * 60 * 1000);
    labelEl.textContent = `${minutes} min timer`;
    timerTick = setInterval(tickTimer, 500);
    tickTimer();
  }

  function tickTimer() {
    if (!timerEnd) return;
    const remaining = Math.max(0, timerEnd - Date.now());
    const totalSecs = Math.ceil(remaining / 1000);
    const mins = Math.floor(totalSecs / 60);
    const secs = totalSecs % 60;
    timerEl.textContent = `${mins.toString().padStart(2,"0")}:${secs.toString().padStart(2,"0")}`;

    // Warning: red + flash when under 2 minutes
    timerEl.classList.toggle("warning", totalSecs <= 120);

    if (remaining === 0) {
      clearInterval(timerTick);
      timerEl.textContent = "00:00";
      labelEl.textContent = "Time's up";
    }
  }

  function stopTimer() {
    clearInterval(timerTick);
    timerEnd = null;
    timerEl.textContent = "--:--";
    timerEl.classList.remove("warning");
    labelEl.textContent = "";
  }

  // ── Clock (no timer active) ─────────────────────────────────────────────────
  function updateClock() {
    if (timerEnd) return;
    const now = new Date();
    const h = now.getHours().toString().padStart(2,"0");
    const m = now.getMinutes().toString().padStart(2,"0");
    timerEl.textContent = `${h}:${m}`;
  }

  clockTick = setInterval(updateClock, 10000);
  updateClock();

  // Start timer if passed in URL (e.g. from director timetable view)
  if (initMins > 0) startTimer(initMins);

  // ── Messages ─────────────────────────────────────────────────────────────────
  function pushMessage() {
    const text = document.getElementById("roomMsgInput").value.trim();
    if (!text) return;
    const el = document.getElementById("roomMessage");
    el.textContent = text;
    el.classList.remove("hidden");

    // TODO: write to Firebase rooms collection
    // db.collection(COLLECTIONS.rooms).doc(roomParam).update({ message: text });
  }

  function clearMessage() {
    document.getElementById("roomMessage").classList.add("hidden");
    document.getElementById("roomMsgInput").value = "";

    // TODO: clear in Firebase
    // db.collection(COLLECTIONS.rooms).doc(roomParam).update({ message: "" });
  }

  // TODO: listen for incoming messages from Firebase
  // db.collection(COLLECTIONS.rooms).doc(roomParam).onSnapshot(doc => {
  //   const data = doc.data();
  //   if (data.message) { ... show message ... }
  //   if (data.timerEnd) { timerEnd = data.timerEnd.toDate(); tickTimer(); }
  // });

  // Auto-refresh session name from live programme
  function updateSessionName() {
    const day = detectCurrentDay();
    if (!day) return;
    const sessions = PROGRAMME[day].sessions.sort((a,b) => timeToMinutes(a.start) - timeToMinutes(b.start));
    const live = sessions.find(s => isSessionCurrent(s));
    if (live) document.getElementById("sessionName").textContent = live.title;
  }

  function detectCurrentDay() {
    const d = new Date().getDay(); // 0=Sun,5=Fri,6=Sat
    if (d === 5) return "friday";
    if (d === 6) return "saturday";
    if (d === 0) return "sunday";
    return null;
  }

  updateSessionName();
  setInterval(updateSessionName, 60000);
</script>
</body>
</html>
